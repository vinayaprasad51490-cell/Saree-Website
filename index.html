    <script src="script.js"></script>
   <script>
function addToCart(name, price, image) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({
    name: name,
    price: price,
    image: image
  });

  localStorage.setItem("cart", JSON.stringify(cart));

  updateCartCount();   // 🔥 UPDATE BADGE
  alert("Added to cart!");
}
</script>
